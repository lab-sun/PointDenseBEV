# 训练用
OPTIMIZATION:
    BATCH_SIZE_PER_GPU: 1
    NUM_EPOCHS: 20
    OPTIMIZER: OneCycle_with_WarmupLR # adamW_with_WarmupLR_cosdecay OneCycle_with_WarmupLR
    LR: 0.003 # 0.001max AdamW*0.3设为0.0003 重启*0.8
    WEIGHT_DECAY: 0.001  # 0.0005 AdamW设为0.0005 重启0.001
    MOMENTUM: 0.9

    MOMS: [0.95, 0.85]
    PCT_START: 0.1 # 衰减点
    DIV_FACTOR: 10
    DECAY_STEP_LIST: [4, 8, 12, 16, 20] # [5, 10, 15, 20, 25, 30]
    LR_DECAY: 0.1
    LR_CLIP: 0.0000001 #1e-7

    LR_WARMUP: True
    WARMUP_EPOCH: 1
    GRAD_NORM_CLIP: 10

    # for AdamW
    BETA1: 0.9
    BETA2: 0.999
    EPS: 0.00000001 #1e-8