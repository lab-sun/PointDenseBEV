# 会覆盖tools/cfgs/dataset_configs/kitti_dataset.yaml
CLASS_NAMES: ['car','truck', 'construction_vehicle', 'bus', 'trailer',
              'barrier', 'motorcycle', 'bicycle', 'pedestrian', 'traffic_cone']

DATA_CONFIG:
    _BASE_CONFIG_: ./tools/cfgs/dataset_configs/kitti_dataset.yaml

    POINT_CLOUD_RANGE: [-50.0, -25.0, -2.5, 50.0, 25.0, 1.5]
    DATA_PROCESSOR:
        -   NAME: mask_points_and_boxes_outside_range
            REMOVE_OUTSIDE_BOXES: True

        -   NAME: shuffle_points
            SHUFFLE_ENABLED: {
                'train': True,
                'test': True
            }

        -   NAME: transform_points_to_voxels
            VOXEL_SIZE: [0.1, 0.1, 0.5]  # 更改voxels大小 [0.1, 0.1, 0.5] 
            # 修改z之后需要在 data_processor.py 里修改 grid_size 大小
            MAX_POINTS_PER_VOXEL: 10
            MAX_NUMBER_OF_VOXELS: {
                'train': 50000, # 50000 30000 
                'test': 50000
            }

        - NAME: image_crop
          FINAL_DIM: [320,1024]

        - NAME: image_calibrate
        

    DATA_AUGMENTOR:
        DISABLE_AUG_LIST: ['placeholder', 'gt_sampling']
        AUG_CONFIG_LIST:
            - NAME: random_world_flip
              ALONG_AXIS_LIST: ['x', 'y']

            - NAME: random_world_rotation
              WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

            - NAME: random_world_scaling
              WORLD_SCALE_RANGE: [0.95, 1.05]

            - NAME: random_world_translation
              WORLD_TRANSLATE_RANGE: [5.0, 5.0, 0.05]

MODEL:
    NAME: PointPillar

    VFE:
        NAME: PillarVFE
        WITH_DISTANCE: False
        USE_ABSLOTE_XYZ: True
        USE_NORM: True
        NUM_FILTERS: [64]

    MAP_TO_BEV:
        NAME: PointPillarScatter
        NUM_BEV_FEATURES: 64
        VOXEL_DIM_NUM: [1000, 500, 8] # self.nx, self.ny, self.nz

    # IMAGE_BACKBONE:
